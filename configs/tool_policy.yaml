# Tool permission policy — gates which tools may be invoked at which privacy level.
# Batch 15 wires these rules into PermissionGate + CapabilityBoundary.

default_policy: deny   # allow | deny | confirm

tools:
  search_notes:
    description: "Hybrid search over indexed notes"
    allowed_privacy:
      - public
      - private_summary
      - private_raw
      - company_sensitive

  read_note:
    description: "Read a single note from allowed_roots"
    allowed_privacy:
      - public
      - private_summary
      - private_raw
      - company_sensitive

  list_recent_notes:
    description: "List recently indexed notes"
    allowed_privacy:
      - public
      - private_summary
      - private_raw
      - company_sensitive

  export_report:
    description: "Export a synthesized report to disk"
    allowed_privacy:
      - public
      - private_summary
    requires_confirmation:
      - public
      - private_summary
      - private_raw
    blocked_privacy:
      - company_sensitive

  web_search:
    description: "External web search"
    allowed_privacy:
      - public
    requires_confirmation:
      - private_summary
    blocked_privacy:
      - private_raw
      - company_sensitive

  shell_exec:
    description: "Execute shell commands"
    requires_confirmation:
      - public
      - private_summary
      - private_raw
    blocked_privacy:
      - company_sensitive
